name: remind_me
description: A visually delightful wellness break reminder app.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  go_router: ^14.2.7

  equatable: ^2.0.5
  uuid: ^4.4.2
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
